name: CD - Deploy & DAST

on:
  workflow_call:

permissions:
  contents: read

jobs:

  # ============================================================
  # GATE 8: DEPLOY
  # ============================================================
  deploy:
    name: Deploy to EC2 via SSH
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create Deployment Directory
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_SSH_HOST }}
          username: ${{ secrets.EC2_SSH_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            echo "Installing required packages & folders"
            sudo apt-get update && sudo apt-get install docker.io -y
            sudo usermod -aG docker $USER
            mkdir -p ~/bankapp

      - name: Copy docker-compose.yml to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_SSH_HOST }}
          username: ${{ secrets.EC2_SSH_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          source: "docker-compose.yml"
          target: "~/bankapp"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_SSH_HOST }}
          username: ${{ secrets.EC2_SSH_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            # Login to Docker Hub
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login \
              --username "${{ secrets.DOCKERHUB_USERNAME }}" \
              --password-stdin

            cd ~/bankapp

            # Write .env file from GitHub Secrets
            cat > .env << ENVEOF
            DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
            IMAGE_TAG=${{ github.sha }}
            ENVEOF

            # Pull latest images and redeploy
            docker compose -f docker-compose.yml pull
            docker compose -f docker-compose.yml up -d --force-recreate --remove-orphans

            # Clean up dangling images
            docker image prune -f

  # ============================================================
  # GATE 9: DAST - Dynamic Application Security Testing
  # ============================================================
  dast:
    name: DAST - OWASP ZAP Baseline Scan
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Run OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.15.0
        continue-on-error: true  # Workaround for ZAP's internal artifact upload bug
        with:
          target: 'http://${{ secrets.EC2_SSH_HOST }}:8080'
          artifact_name: zapreport
          fail_action: false
          allow_issue_writing: false

      - name: Upload ZAP Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-dast-report
          path: report_html.html