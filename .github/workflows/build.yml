name: Build - Container Build & Push

on:
  workflow_call:

permissions:
  contents: read

jobs:

  # ============================================================
  # GATE 5: BUILD
  # ============================================================
  build:
    name: Build & Package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar

  # ============================================================
  # GATE 6: CONTAINER IMAGE SCAN - Trivy
  # ============================================================
  image_scan:
    name: Container Scan - Trivy
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push scan-tagged Image
        run: |
          docker build --pull -t ${{ secrets.DOCKERHUB_USERNAME }}/bankapp:scan-${{ github.sha }} .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/bankapp:scan-${{ github.sha }}

      - name: Cache Trivy DB
        uses: actions/cache@v4
        with:
          path: ~/.cache/trivy
          key: trivy-db-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            trivy-db-${{ runner.os }}-

      - name: Run Trivy Image Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/bankapp:scan-${{ github.sha }}
          format: 'table'
          exit-code: '1'         # Enforce: fail pipeline on CRITICAL/HIGH findings
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
          output: trivy-report.txt
          trivy-config: trivy.yaml

      - name: Upload Trivy Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-scan-report
          path: trivy-report.txt

  # ============================================================
  # GATE 7: PUSH TO DOCKER HUB
  # ============================================================
  push_to_dockerhub:
    name: Push to Docker Hub
    runs-on: ubuntu-latest
    needs: image_scan
    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Retag and Push Final Image
        run: |
          # Pull the scan-tagged image built and scanned in Gate 6
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/bankapp:scan-${{ github.sha }}

          # Retag to final tags
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/bankapp:scan-${{ github.sha }} ${{ secrets.DOCKERHUB_USERNAME }}/bankapp:${{ github.sha }}
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/bankapp:scan-${{ github.sha }} ${{ secrets.DOCKERHUB_USERNAME }}/bankapp:latest

          # Push final tags
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/bankapp:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/bankapp:latest

          # Delete the temporary scan tag
          docker rmi ${{ secrets.DOCKERHUB_USERNAME }}/bankapp:scan-${{ github.sha }}